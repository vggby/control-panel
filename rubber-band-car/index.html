<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用橡皮筋驱动小车 - 互动实验</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#f0f4f8;overflow-x:hidden;user-select:none}
.header{background:linear-gradient(135deg,#1a73e8,#4fc3f7);color:#fff;padding:14px 24px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:20px;margin-bottom:2px}
.header p{font-size:12px;opacity:.9}
.main{display:flex;gap:14px;padding:14px;max-width:1400px;margin:0 auto}
.canvas-panel{flex:1;min-width:0}
.canvas-wrap{background:#fff;border-radius:12px;padding:10px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
#simCanvas{width:100%;border-radius:8px;display:block}
.controls{background:#fff;border-radius:12px;padding:14px;margin-top:10px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.control-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.control-group{display:flex;align-items:center;gap:6px}
.control-group label{font-size:13px;font-weight:600;color:#333;white-space:nowrap}
.btn{padding:7px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-release{background:#ff6d00;color:#fff}
.btn-release:hover{background:#e65100}
.btn-release:disabled{background:#ccc;cursor:not-allowed}
.btn-reset{background:#1a73e8;color:#fff}
.btn-reset:hover{background:#1557b0}
.btn-clear{background:#f44336;color:#fff;font-size:12px;padding:5px 10px}
.side-panel{width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.data-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.data-card h3{font-size:14px;color:#1a73e8;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e3f2fd}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:#e3f2fd;padding:5px 6px;text-align:center;font-weight:600}
.data-table td{padding:4px 6px;text-align:center;border-bottom:1px solid #eee}
.chart-wrap{width:100%;height:180px}
.status-bar{background:#fff;border-radius:10px;padding:10px 14px;margin-top:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;gap:20px;font-size:13px;flex-wrap:wrap}
.status-item{display:flex;align-items:center;gap:5px}
.status-dot{width:9px;height:9px;border-radius:50%}
.dot-idle{background:#9e9e9e}
.dot-running{background:#ff9800;animation:pulse .6s infinite}
.dot-done{background:#2196f3}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:900px){.main{flex-direction:column}.side-panel{width:100%}}
</style>
</head>
<body>
<div class="header">
  <h1>🔬 用橡皮筋驱动小车 — 互动实验</h1>
  <p>选择橡皮筋根数 → 拖动滑块拉伸 → 点击释放小车 → 观察运动距离</p>
</div>
<div class="main">
  <div class="canvas-panel">
    <div class="canvas-wrap">
      <canvas id="simCanvas" width="900" height="340"></canvas>
    </div>
    <div class="controls">
      <div class="control-row">
        <div class="control-group">
          <label>橡皮筋根数：</label>
          <select id="bandCount"><option value="1">1 根</option><option value="2">2 根</option><option value="3">3 根</option></select>
        </div>
        <div class="control-group">
          <label>拉伸长度：<strong id="stretchVal" style="color:#e53935">0</strong> cm</label>
          <input type="range" id="stretchSlider" min="0" max="20" value="0" step="1" style="width:180px">
        </div>
        <button class="btn btn-release" id="btnRelease" disabled>🚀 释放小车</button>
        <button class="btn btn-reset" id="btnReset">🔄 重置</button>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-item"><span class="status-dot dot-idle" id="dotStatus"></span><span id="statusText">调好参数后点击释放小车</span></div>
      <div class="status-item">📏 运动距离：<strong id="distDisplay">—</strong></div>
      <div class="status-item">🔢 已记录：<strong id="trialCount">0</strong> 次</div>
    </div>
  </div>
  <div class="side-panel">
    <div class="data-card">
      <h3>🔍 实验发现</h3>
      <div id="findings" style="font-size:12px;color:#333;line-height:1.8">
        <p style="color:#999">进行多次实验后，这里会自动分析你的实验发现...</p>
      </div>
    </div>
    <div class="data-card">
      <h3>📊 实验数据记录</h3>
      <table class="data-table"><thead><tr><th>次数</th><th>根数</th><th>拉伸(cm)</th><th>距离(cm)</th></tr></thead><tbody id="dataBody"></tbody></table>
    </div>
    <div class="data-card">
      <h3>📈 距离趋势图</h3>
      <div class="chart-wrap"><canvas id="chartCanvas"></canvas></div>
    </div>
    <button class="btn btn-clear" id="btnClear">🗑️ 清空数据</button>
  </div>
</div>
<script>
const canvas=document.getElementById('simCanvas'),ctx=canvas.getContext('2d');
const chartCanvas=document.getElementById('chartCanvas'),chartCtx=chartCanvas.getContext('2d');
const dpr=window.devicePixelRatio||1;
function setupCanvas(c,w,h){c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';c.getContext('2d').scale(dpr,dpr);}

let CW=900,CH=340,GROUND_Y=270;
let ANCHOR_X=50,START_LINE=160;
let state='idle',bandCount=1,carX=START_LINE,carVx=0,stretchPx=0,distance=0,data=[];

const bandSelect=document.getElementById('bandCount');
const btnRelease=document.getElementById('btnRelease');
const btnReset=document.getElementById('btnReset');
const btnClear=document.getElementById('btnClear');
const stretchVal=document.getElementById('stretchVal');
const slider=document.getElementById('stretchSlider');
const distDisplay=document.getElementById('distDisplay');
const trialCount=document.getElementById('trialCount');
const statusText=document.getElementById('statusText');
const dotStatus=document.getElementById('dotStatus');
const dataBody=document.getElementById('dataBody');

bandSelect.addEventListener('change',()=>{bandCount=parseInt(bandSelect.value);draw();});

slider.addEventListener('input',()=>{
  if(state==='running')return;
  const cm=parseInt(slider.value);
  stretchPx=cm/0.15;
  stretchVal.textContent=cm;
  if(cm>0){
    state='ready';btnRelease.disabled=false;
    setStatus('idle','拉伸 '+cm+'cm，点击释放小车');
  }else{
    state='idle';btnRelease.disabled=true;
    setStatus('idle','调好参数后点击释放小车');
  }
  distance=0;distDisplay.textContent='—';draw();
});

btnRelease.addEventListener('click',()=>{if(state==='ready'||state==='idle')releaseCar();});
btnReset.addEventListener('click',resetSim);
btnClear.addEventListener('click',()=>{data=[];renderTable();drawChart();analyzeFindings();trialCount.textContent='0';});

function resetSim(){
  state='idle';carX=START_LINE;carVx=0;stretchPx=0;distance=0;
  bandSelect.disabled=false;slider.disabled=false;slider.value=0;
  btnRelease.disabled=true;stretchVal.textContent='0';distDisplay.textContent='—';
  setStatus('idle','调好参数后点击释放小车');draw();
}

function setStatus(type,text){
  statusText.textContent=text;
  dotStatus.className='status-dot dot-'+(type==='running'?'running':type==='done'?'done':'idle');
}

function releaseCar(){
  if(stretchPx<3){setStatus('idle','请先拉伸橡皮筋');return;}
  state='running';slider.disabled=true;btnRelease.disabled=true;bandSelect.disabled=true;
  const cm=parseInt(slider.value);
  // 让距离合理：拉伸cm × 根数 × 系数
  carVx=cm*bandCount*0.32+0.5;
  setStatus('running','🚗 小车正在运动...');
  animate();
}

function animate(){
  if(state!=='running')return;
  carX+=carVx;carVx*=0.975;
  if(carX>CW-40){carX=CW-40;carVx=0;}
  if(carVx<0.15){
    carVx=0;state='done';
    distance=((carX-START_LINE)*0.15).toFixed(1);
    distDisplay.textContent=distance+' cm';
    setStatus('done','✅ 运动距离 '+distance+' cm');
    bandSelect.disabled=false;slider.disabled=false;
    data.push({trial:data.length+1,bands:bandCount,stretch:parseInt(slider.value),distance:parseFloat(distance)});
    trialCount.textContent=data.length;
    renderTable();drawChart();try{analyzeFindings();}catch(e){}
  }
  draw();
  if(state==='running')requestAnimationFrame(animate);
}

// ===== 绘图 =====
function draw(){
  ctx.clearRect(0,0,CW,CH);
  const skyG=ctx.createLinearGradient(0,0,0,GROUND_Y);
  skyG.addColorStop(0,'#e8f4fd');skyG.addColorStop(1,'#c8e6fa');
  ctx.fillStyle=skyG;ctx.fillRect(0,0,CW,GROUND_Y);
  const tG=ctx.createLinearGradient(0,GROUND_Y,0,CH);
  tG.addColorStop(0,'#d7c4a7');tG.addColorStop(0.3,'#c9b68e');tG.addColorStop(1,'#b8a478');
  ctx.fillStyle=tG;ctx.fillRect(0,GROUND_Y,CW,CH-GROUND_Y);
  ctx.fillStyle='#a08960';ctx.fillRect(0,GROUND_Y,CW,3);
  const trackY=GROUND_Y+2;
  ctx.fillStyle='#f5f0e8';ctx.fillRect(ANCHOR_X,trackY,CW-ANCHOR_X-30,CH-GROUND_Y-10);
  ctx.fillStyle='#999';ctx.font='9px sans-serif';ctx.textAlign='center';
  for(let px=0;px<CW-ANCHOR_X-30;px+=20){
    const x=ANCHOR_X+px,major=px%67===0;
    ctx.fillRect(x,trackY+2,1,major?14:8);
    if(major){ctx.fillStyle='#666';ctx.fillText((px*0.15).toFixed(0)+'cm',x,trackY+26);ctx.fillStyle='#999';}
  }
  // 起点线
  ctx.strokeStyle='#e53935';ctx.lineWidth=2;ctx.setLineDash([5,3]);
  ctx.beginPath();ctx.moveTo(START_LINE,trackY);ctx.lineTo(START_LINE,trackY+45);ctx.stroke();
  ctx.setLineDash([]);ctx.fillStyle='#e53935';ctx.font='bold 10px sans-serif';ctx.fillText('起点',START_LINE,trackY+55);

  drawClamp(ANCHOR_X,GROUND_Y);

  // 橡皮筋
  const bx1=ANCHOR_X+6,by1=GROUND_Y-15,bx2=carX-34,by2=GROUND_Y-20;
  const loose=(state==='idle'&&stretchPx<3)||state==='done';
  const tight=state==='running'&&carX<START_LINE+stretchPx*0.3;
  drawRubberBands(bx1,by1,bx2,by2,bandCount,tight,loose);

  drawCar(carX,GROUND_Y);

  // 拉伸标注
  if((state==='ready')&&stretchPx>5){
    const sY=GROUND_Y-80;
    const hookX=START_LINE-34;
    const pullX=hookX-stretchPx;
    ctx.strokeStyle='#e53935';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(pullX,sY);ctx.lineTo(hookX,sY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#e53935';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText('拉伸 '+parseInt(slider.value)+'cm',(pullX+hookX)/2,sY-6);
  }

  // 距离标注
  if(state==='done'&&distance>0){
    const endX=carX,arrowY=GROUND_Y-65;
    ctx.strokeStyle='#1565c0';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(START_LINE,arrowY);ctx.lineTo(endX,arrowY);ctx.stroke();
    ctx.fillStyle='#1565c0';
    ctx.beginPath();ctx.moveTo(START_LINE,arrowY-4);ctx.lineTo(START_LINE-7,arrowY);ctx.lineTo(START_LINE,arrowY+4);ctx.fill();
    ctx.beginPath();ctx.moveTo(endX,arrowY-4);ctx.lineTo(endX+7,arrowY);ctx.lineTo(endX,arrowY+4);ctx.fill();
    const lw=ctx.measureText(distance+' cm').width+16;
    ctx.fillStyle='rgba(21,101,192,0.1)';ctx.fillRect((START_LINE+endX)/2-lw/2,arrowY-18,lw,16);
    ctx.fillStyle='#1565c0';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
    ctx.fillText(distance+' cm',(START_LINE+endX)/2,arrowY-7);
  }
}

function drawClamp(x,gy){
  ctx.fillStyle='#455a64';ctx.fillRect(x-5,gy-30,14,30);
  ctx.strokeStyle='#37474f';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(x+2,gy-32,8,Math.PI,0);ctx.stroke();
  ctx.fillStyle='#e53935';ctx.beginPath();ctx.arc(x+6,gy-15,3,0,Math.PI*2);ctx.fill();
}

function drawRubberBands(x1,y1,x2,y2,count,tight,loose){
  const colors=['#e53935','#43a047','#1e88e5'],spread=5;
  for(let i=0;i<count;i++){
    const offset=count===1?0:(i-(count-1)/2)*spread;
    ctx.strokeStyle=colors[i%3];ctx.lineWidth=tight?2.5:3;
    const midX=(x1+x2)/2,sag=loose?15:tight?2:5,midY=(y1+y2)/2+sag;
    ctx.beginPath();ctx.moveTo(x1,y1+offset);ctx.quadraticCurveTo(midX,midY+offset,x2,y2+offset);ctx.stroke();
  }
}

function drawCar(x,gy){
  const w=64,h=14,bodyY=gy-h-16;
  ctx.fillStyle='#c9a96e';ctx.beginPath();
  ctx.moveTo(x-w/2+3,bodyY);ctx.lineTo(x+w/2-3,bodyY);
  ctx.arcTo(x+w/2,bodyY,x+w/2,bodyY+3,3);ctx.lineTo(x+w/2,bodyY+h-3);
  ctx.arcTo(x+w/2,bodyY+h,x+w/2-3,bodyY+h,3);ctx.lineTo(x-w/2+3,bodyY+h);
  ctx.arcTo(x-w/2,bodyY+h,x-w/2,bodyY+h-3,3);ctx.lineTo(x-w/2,bodyY+3);
  ctx.arcTo(x-w/2,bodyY,x-w/2+3,bodyY,3);ctx.fill();
  ctx.fillStyle='#dbb87a';ctx.fillRect(x-w/2+2,bodyY,w-4,h/2);
  ctx.fillStyle='#8d6e4c';ctx.fillRect(x-w/2-2,bodyY-14,5,16);
  ctx.fillStyle='#6d4c30';ctx.beginPath();ctx.arc(x-w/2,bodyY-14,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#8d6e4c';ctx.fillRect(x+w/2-2,bodyY-4,4,h+4);
  const wheelR=7,axleY=gy-wheelR;
  for(const wx of[x-20,x+20]){
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(wx,axleY,wheelR,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#888';ctx.beginPath();ctx.arc(wx,axleY,2.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.beginPath();ctx.arc(wx,axleY,wheelR-1,-0.5,0.5);ctx.stroke();
  }
  ctx.strokeStyle='#666';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x-20,axleY);ctx.lineTo(x+20,axleY);ctx.stroke();
}

function analyzeFindings(){
  const el=document.getElementById('findings');
  if(data.length<2){el.innerHTML='<p style="color:#999">再进行 '+(2-data.length)+' 次实验就能看到分析结果了...</p>';return;}
  let html='';
  const sameB=data.filter(d=>d.bands===data[0].bands);
  if(sameB.length>=2){const s=[...sameB].sort((a,b)=>a.stretch-b.stretch);let ok=true;for(let i=1;i<s.length;i++)if(s[i].distance<=s[i-1].distance){ok=false;break;}if(ok)html+='<p>📌 <b>拉伸长度越大，小车运动距离越远。</b>（'+s[0].stretch+'cm→'+s[s.length-1].stretch+'cm，距离 '+s[0].distance+'cm→'+s[s.length-1].distance+'cm）</p>';}
  const groups={};data.forEach(d=>{const k=d.stretch;if(!groups[k])groups[k]=[];groups[k].push(d);});
  for(const[stretch,entries]of Object.entries(groups)){if(entries.length>=2){const s=[...entries].sort((a,b)=>a.bands-b.bands);let ok=true;for(let i=1;i<s.length;i++)if(s[i].distance<=s[i-1].distance){ok=false;break;}if(ok){html+='<p>📌 <b>橡皮筋根数越多，小车运动距离越远。</b>（拉伸'+stretch+'cm时，'+s[0].bands+'根→'+s[s.length-1].bands+'根，距离 '+s[0].distance+'cm→'+s[s.length-1].distance+'cm）</p>';break;}}}
  if(data.length>=3)html+='<p>💡 <b>结论：弹力越大，小车运动距离越远。</b>增大拉伸长度或增加橡皮筋根数都能增大弹力。</p>';
  const maxD=Math.max(...data.map(d=>d.distance)),minD=Math.min(...data.map(d=>d.distance));
  html+='<p style="color:#666;margin-top:4px">📊 共'+data.length+'次实验 | 最远'+maxD+'cm | 最近'+minD+'cm</p>';
  el.innerHTML=html||'<p style="color:#999">继续实验，尝试改变不同条件来发现规律...</p>';
}

function renderTable(){dataBody.innerHTML='';data.forEach(d=>{const tr=document.createElement('tr');tr.innerHTML='<td>'+d.trial+'</td><td>'+d.bands+'</td><td>'+d.stretch+'</td><td>'+d.distance+'</td>';dataBody.appendChild(tr);});}

function drawChart(){
  const w=chartCanvas.parentElement.clientWidth,h=180;setupCanvas(chartCanvas,w,h);chartCtx.clearRect(0,0,w,h);
  if(!data.length){chartCtx.fillStyle='#999';chartCtx.font='12px sans-serif';chartCtx.textAlign='center';chartCtx.fillText('实验数据将在这里显示',w/2,h/2);return;}
  const pad={top:18,right:16,bottom:26,left:40},pw=w-pad.left-pad.right,ph=h-pad.top-pad.bottom;
  const maxDist=Math.max(...data.map(d=>d.distance),10),yMax=Math.ceil(maxDist/10)*10+10;
  chartCtx.strokeStyle='#eee';chartCtx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.top+(ph/4)*i;chartCtx.beginPath();chartCtx.moveTo(pad.left,y);chartCtx.lineTo(pad.left+pw,y);chartCtx.stroke();chartCtx.fillStyle='#666';chartCtx.font='9px sans-serif';chartCtx.textAlign='right';chartCtx.fillText((yMax-(yMax/4)*i).toFixed(0),pad.left-4,y+3);}
  chartCtx.textAlign='center';chartCtx.fillStyle='#666';chartCtx.font='9px sans-serif';
  data.forEach((d,i)=>{const x=pad.left+(pw/(data.length+1))*(i+1);chartCtx.fillText('#'+d.trial,x,h-5);});
  const colors={1:'#e53935',2:'#43a047',3:'#1e88e5'};
  chartCtx.lineWidth=2.5;chartCtx.strokeStyle='#1565c0';chartCtx.beginPath();
  data.forEach((d,i)=>{const x=pad.left+(pw/(data.length+1))*(i+1),y=pad.top+ph-(d.distance/yMax)*ph;if(!i)chartCtx.moveTo(x,y);else chartCtx.lineTo(x,y);});chartCtx.stroke();
  data.forEach((d,i)=>{const x=pad.left+(pw/(data.length+1))*(i+1),y=pad.top+ph-(d.distance/yMax)*ph;chartCtx.fillStyle=colors[d.bands]||'#1565c0';chartCtx.beginPath();chartCtx.arc(x,y,4,0,Math.PI*2);chartCtx.fill();chartCtx.fillStyle='#333';chartCtx.font='bold 9px sans-serif';chartCtx.fillText(d.distance,x,y-8);});
  [1,2,3].forEach((n,i)=>{if(data.some(d=>d.bands===n)){chartCtx.fillStyle=colors[n];chartCtx.fillRect(pad.left+pw-50,pad.top+i*14,8,8);chartCtx.fillStyle='#333';chartCtx.font='9px sans-serif';chartCtx.textAlign='left';chartCtx.fillText(n+'根',pad.left+pw-38,pad.top+i*14+8);}});
}

function resizeCanvas(){
  const w=canvas.parentElement.clientWidth-20,h=340;setupCanvas(canvas,w,h);CW=w;CH=h;
  GROUND_Y=CH-70;START_LINE=160;ANCHOR_X=50;
  if(state==='idle')carX=START_LINE;draw();
}
window.addEventListener('resize',()=>{resizeCanvas();drawChart();});
resizeCanvas();drawChart();
</script>
</body>
</html>
